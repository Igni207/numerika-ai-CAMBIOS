services:
  # Base de Datos Principal (PostgreSQL)
  db:
    image: postgres:15
    container_name: numerika-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Capa de Caché y Contexto (Redis)
  cache:
    image: redis:7-alpine
    container_name: numerika-redis
    restart: always
    ports:
      - "6379:6379"

  # Motor Matemático Simbólico (FastAPI + SymPy)
  math-engine:
    build: ./backend
    container_name: numerika-math-engine
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MATH_ENGINE_HOST=0.0.0.0
      - MATH_ENGINE_PORT=8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - math_cache:/app/data

volumes:
  postgres_data:
  math_cache: